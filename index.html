<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Committee Transcripts</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5b6573;
      --line: #d7dde6;
      --blue: #1b5f9e;
      --green: #236b4e;
      --amber: #9a5b11;
      --soft-blue: #eaf2fb;
      --soft-green: #e8f4ee;
      --soft-amber: #fff4df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      gap: 22px;
      padding: 54px 0 42px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .note {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 260px));
      gap: 12px;
      padding: 8px 0 4px;
    }

    input, select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    #search {
      grid-column: 1 / -1;
      min-height: 62px;
      max-width: 860px;
      border: 2px solid var(--blue);
      border-radius: 8px;
      padding: 16px 18px;
      font-size: 1.14rem;
      box-shadow: 0 10px 28px rgba(27, 95, 158, 0.13);
    }

    input:focus, select:focus {
      outline: 3px solid var(--soft-blue);
      border-color: var(--blue);
    }

    main { padding: 30px 0 44px; }

    .summary, .reader-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 5px 10px;
    }

    .pill strong { color: var(--ink); }

    .meetings {
      display: grid;
      gap: 12px;
    }

    .meeting {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .meeting h2 {
      margin: 0 0 8px;
      font-size: 1.13rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--soft-green);
      color: var(--green);
      font-size: 0.86rem;
    }

    .desc, .snippet {
      margin: 9px 0 0;
      color: var(--muted);
    }

    .desc-toggle {
      margin-left: 6px;
      border: 0;
      background: transparent;
      color: var(--blue);
      font: inherit;
      padding: 0;
      cursor: pointer;
    }

    .desc-toggle:hover { text-decoration: underline; }

    .snippets {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .snippet {
      border-left: 3px solid var(--amber);
      background: var(--soft-amber);
      padding: 8px 10px;
      color: #3f3529;
    }

    mark {
      background: #ffdf7e;
      color: #1f1a12;
      padding: 0 2px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .links a, .links button, .reader-close {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 9px;
      color: var(--blue);
      text-decoration: none;
      background: #fff;
      font: inherit;
      font-size: 0.92rem;
      cursor: pointer;
    }

    .links a:hover, .links button:hover, .reader-close:hover {
      border-color: var(--blue);
      background: var(--soft-blue);
      text-decoration: none;
    }

    .empty {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
      color: var(--muted);
    }

    body.reader-open { overflow: hidden; }

    .reader-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      justify-items: end;
      background: rgba(23, 32, 42, 0.38);
    }

    .reader-backdrop[hidden] { display: none; }

    .reader {
      width: min(900px, 100%);
      height: 100%;
      overflow: auto;
      background: var(--panel);
      box-shadow: -12px 0 28px rgba(23, 32, 42, 0.22);
    }

    .reader-inner {
      display: grid;
      gap: 14px;
      padding: 20px;
    }

    .reader-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .reader-top h2 {
      margin: 4px 0 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .reader-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .reader-tools {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .reader-file-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .reader-matches, .transcript {
      display: grid;
      gap: 8px;
    }

    .match-button {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 8px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-blue);
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .match-time, .transcript-time {
      color: var(--blue);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .transcript {
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .transcript-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 6px;
    }

    .transcript-row p { margin: 0; }

    .transcript-row.is-focused {
      background: var(--soft-amber);
      outline: 2px solid #f0bf54;
    }

    @media (max-width: 760px) {
      .wrap { width: min(100% - 22px, 1180px); }
      .topbar { padding: 38px 0 30px; }
      .controls, .reader-tools, .match-button, .transcript-row { grid-template-columns: 1fr; }
      #search { min-height: 58px; font-size: 1.04rem; }
      .meeting { padding: 14px; }
      .reader-file-links { justify-content: start; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Select Committee Transcripts</h1>
        <p class="note">These transcripts are automatically generated and may contain errors. Check the source video, TXT, or VTT file before relying on exact wording.</p>
      </div>
      <div class="controls" role="search">
        <input id="search" type="search" autocomplete="off" placeholder="Search title, committee, date, transcript">
        <select id="committee" aria-label="Committee filter">
          <option value="">All committees</option>
        </select>
        <select id="month" aria-label="Month filter">
          <option value="">All months</option>
        </select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="summary" id="summary">Loading site data...</div>
    <section class="meetings" id="meetings" aria-live="polite"></section>
    <div class="empty" id="empty">No meetings match the current filters.</div>
  </main>

  <div class="reader-backdrop" id="readerBackdrop" hidden>
    <section class="reader" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
      <div class="reader-inner">
        <div class="reader-top">
          <div>
            <div class="reader-meta" id="readerMeta"></div>
            <h2 id="readerTitle"></h2>
          </div>
          <button class="reader-close" id="readerClose" type="button">Close</button>
        </div>
        <div class="reader-tools">
          <input id="readerSearch" type="search" autocomplete="off" placeholder="Search this transcript">
          <div class="reader-file-links links" id="readerLinks"></div>
        </div>
        <div class="reader-stats" id="readerStats"></div>
        <div class="reader-matches" id="readerMatches"></div>
        <div class="transcript" id="readerTranscript"></div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      manifest: null,
      data: null,
      query: "",
      committee: "",
      month: "",
      transcriptMatches: null,
      searchSnippets: new Map(),
      transcriptStatus: "",
      searchRun: 0,
      searchDebounceTimer: null,
      searchDebounceMs: 220,
      shardCache: new Map(),
      transcriptCache: new Map(),
      expandedDescriptions: new Set(),
      activeMeeting: null,
      activeTranscript: null,
      readerQuery: ""
    };

    const els = {
      search: document.getElementById("search"),
      committee: document.getElementById("committee"),
      month: document.getElementById("month"),
      summary: document.getElementById("summary"),
      meetings: document.getElementById("meetings"),
      empty: document.getElementById("empty"),
      readerBackdrop: document.getElementById("readerBackdrop"),
      readerTitle: document.getElementById("readerTitle"),
      readerMeta: document.getElementById("readerMeta"),
      readerClose: document.getElementById("readerClose"),
      readerSearch: document.getElementById("readerSearch"),
      readerLinks: document.getElementById("readerLinks"),
      readerStats: document.getElementById("readerStats"),
      readerMatches: document.getElementById("readerMatches"),
      readerTranscript: document.getElementById("readerTranscript")
    };

    const escapeHtml = (value) => String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

    const normalize = (value) => String(value || "").toLowerCase();
    const collapseWhitespace = (value) => String(value || "").replace(/\s+/g, " ").trim();
    const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const tokenRegex = /[\p{L}\p{N}]{3,}/gu;
    const stopWords = new Set(["the", "and", "for", "that", "this", "with", "from", "you", "your", "are", "was", "were", "have", "has", "had", "not", "but", "they", "them", "their", "there", "then", "than", "would", "could", "should", "about", "into", "onto", "our", "can", "will", "just", "all", "any", "who", "what", "when", "where", "why", "how"]);

    const fetchJson = async (url, options = {}) => {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    };

    const displayMonth = (month) => {
      if (!month) return "";
      const [year, monthNumber] = month.split("-");
      const date = new Date(Number(year), Number(monthNumber) - 1, 1);
      return date.toLocaleDateString(undefined, { year: "numeric", month: "long" });
    };

    const highlightText = (value, query) => {
      const text = String(value || "");
      if (!query) return escapeHtml(text);
      const regex = new RegExp(`(${escapeRegExp(query)})`, "ig");
      return text.split(regex)
        .map((part) => normalize(part) === normalize(query) ? `<mark>${escapeHtml(part)}</mark>` : escapeHtml(part))
        .join("");
    };

    const metadataMatches = (meeting, query) => {
      if (!query) return true;
      return [
        meeting.displayTitle,
        meeting.sourceTitle,
        meeting.title,
        meeting.date,
        meeting.committee,
        meeting.topic,
        meeting.partLabel,
        meeting.descriptionSummary,
        meeting.description,
        meeting.showcaseId
      ]
        .map(normalize)
        .join(" ")
        .includes(query);
    };

    const queryTerms = (query) => [...new Set((normalize(query).match(tokenRegex) || []))]
      .filter((term) => !stopWords.has(term))
      .filter((term) => term.length >= (state.manifest?.search?.minQueryLength || 3));

    const highlightTerms = (value, query) => {
      const text = String(value || "");
      const terms = queryTerms(query).sort((a, b) => b.length - a.length);
      if (!terms.length) return highlightText(text, query);
      const regex = new RegExp(`(${terms.map(escapeRegExp).join("|")})`, "ig");
      return text.split(regex)
        .map((part) => terms.includes(normalize(part)) ? `<mark>${escapeHtml(part)}</mark>` : escapeHtml(part))
        .join("");
    };

    const shardKey = (term) => {
      const first = term[0] || "";
      return /^[a-z0-9]$/.test(first) ? term.slice(0, 2) : "other";
    };

    const loadShard = async (key) => {
      if (state.shardCache.has(key)) return state.shardCache.get(key);
      const url = state.manifest.search.shardUrls[key];
      const shard = url ? await fetchJson(url) : { terms: {} };
      state.shardCache.set(key, shard);
      return shard;
    };

    const buildTranscriptMatches = (termPostings) => {
      if (!termPostings.length || termPostings.some((postings) => postings.length === 0)) {
        return new Map();
      }

      const otherSets = termPostings.slice(1).map((postings) => new Set(postings.map((posting) => `${posting.guid}|${posting.chunkIndex}`)));
      const grouped = new Map();

      for (const posting of termPostings[0]) {
        const key = `${posting.guid}|${posting.chunkIndex}`;
        if (otherSets.some((set) => !set.has(key))) continue;
        const existing = grouped.get(posting.guid) || { count: 0, chunkIndices: new Set() };
        existing.count += 1;
        existing.chunkIndices.add(posting.chunkIndex);
        grouped.set(posting.guid, existing);
      }

      return new Map([...grouped.entries()].map(([guid, item]) => [guid, {
        count: item.count,
        chunkIndices: [...item.chunkIndices].sort((a, b) => a - b)
      }]));
    };

    const updateTranscriptSearch = async () => {
      const run = ++state.searchRun;
      const query = normalize(state.query).trim();
      const minLength = state.manifest?.search?.minQueryLength || 3;
      if (query.length < minLength) {
        state.transcriptMatches = null;
        state.searchSnippets = new Map();
        state.transcriptStatus = query ? `Transcript search starts at ${minLength}+ characters.` : "";
        render();
        return;
      }

      const terms = queryTerms(query);
      if (!terms.length) {
        state.transcriptMatches = null;
        state.searchSnippets = new Map();
        state.transcriptStatus = `Transcript search starts at ${minLength}+ characters.`;
        render();
        return;
      }

      state.searchSnippets = new Map();
      state.transcriptStatus = "Searching transcript index...";
      render();

      try {
        const termPostings = await Promise.all(terms.map(async (term) => {
          const shard = await loadShard(shardKey(term));
          const meetings = shard.terms?.[term] || {};
          return Object.entries(meetings).flatMap(([guid, chunkIndices]) =>
            chunkIndices.map((chunkIndex) => ({ guid, chunkIndex }))
          );
        }));
        if (run !== state.searchRun) return;
        state.transcriptMatches = buildTranscriptMatches(termPostings);
        state.transcriptStatus = `${[...state.transcriptMatches.values()].reduce((sum, item) => sum + item.count, 0)} transcript matches`;
        render();
        loadTranscriptSearchSnippets(run, query);
      } catch (error) {
        if (run !== state.searchRun) return;
        state.transcriptMatches = new Map();
        state.searchSnippets = new Map();
        state.transcriptStatus = `Transcript search unavailable: ${error.message}`;
        render();
      }
    };

    const scheduleGlobalSearch = () => {
      state.searchRun += 1;
      if (state.searchDebounceTimer) {
        window.clearTimeout(state.searchDebounceTimer);
      }
      state.searchDebounceTimer = window.setTimeout(() => {
        state.searchDebounceTimer = null;
        updateTranscriptSearch();
      }, state.searchDebounceMs);
    };

    const filteredMeetings = () => {
      const query = normalize(state.query).trim();
      return state.data.meetings.filter((meeting) => {
        const committeeMatch = !state.committee || meeting.committee === state.committee;
        const monthMatch = !state.month || meeting.month === state.month;
        const textMatch = !query || metadataMatches(meeting, query) || (state.transcriptMatches && state.transcriptMatches.has(meeting.guid));
        return committeeMatch && monthMatch && textMatch;
      });
    };

    const populateFilters = () => {
      const committees = [...new Set(state.data.meetings.map((item) => item.committee).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
      for (const committee of committees) {
        const option = document.createElement("option");
        option.value = committee;
        option.textContent = committee;
        els.committee.appendChild(option);
      }

      const months = [...new Set(state.data.meetings.map((item) => item.month).filter(Boolean))]
        .sort()
        .reverse();
      for (const month of months) {
        const option = document.createElement("option");
        option.value = month;
        option.textContent = displayMonth(month);
        els.month.appendChild(option);
      }
    };

    const renderTranscriptSnippets = (transcriptMatch, snippetState, query) => {
      if (!transcriptMatch) return "";
      if (!snippetState || snippetState.loading) {
        return `<div class="snippets"><p class="snippet">Loading transcript preview...</p></div>`;
      }
      if (snippetState.error) {
        return `<div class="snippets"><p class="snippet">${escapeHtml(snippetState.error)}</p></div>`;
      }
      if (!snippetState.snippets?.length) {
        return `<div class="snippets"><p class="snippet">Transcript match found, but no preview text was available.</p></div>`;
      }
      return `<div class="snippets">${snippetState.snippets.map((snippet) => `
        <p class="snippet">
          ${snippet.time ? `<span class="snippet-time">${escapeHtml(snippet.time)}</span>` : ""}
          ${highlightTerms(snippet.text, query)}
        </p>
      `).join("")}</div>`;
    };

    const titleFor = (meeting) => meeting.displayTitle || meeting.title || meeting.sourceTitle || "Untitled meeting";

    const renderDescription = (meeting, query) => {
      const summary = meeting.descriptionSummary || meeting.topic || meeting.description || "";
      const full = meeting.description || summary;
      const expanded = state.expandedDescriptions.has(meeting.guid);
      const text = expanded ? full : summary;
      const canToggle = collapseWhitespace(full) && collapseWhitespace(full) !== collapseWhitespace(summary);
      if (!text && !canToggle) return "";
      return `
        <p class="desc">
          ${highlightText(text, query)}
          ${canToggle ? `<button class="desc-toggle" type="button" data-guid="${escapeHtml(meeting.guid)}">${expanded ? "Less" : "More"}</button>` : ""}
        </p>
      `;
    };

    const render = () => {
      if (!state.data) return;
      const query = normalize(state.query).trim();
      const meetings = filteredMeetings();
      const transcriptPill = state.transcriptStatus ? `<span class="pill">${escapeHtml(state.transcriptStatus)}</span>` : "";
      els.summary.innerHTML = `
        <span class="pill"><strong>${meetings.length}</strong> shown</span>
        <span class="pill"><strong>${state.data.meetingCount}</strong> total</span>
        <span class="pill">Generated ${escapeHtml(new Date(state.manifest.generatedAt).toLocaleString())}</span>
        ${transcriptPill}
      `;

      els.empty.style.display = meetings.length ? "none" : "block";
      els.meetings.innerHTML = meetings.map((meeting) => {
        const transcriptMatch = state.transcriptMatches?.get(meeting.guid);
        const snippetState = transcriptMatch ? state.searchSnippets.get(meeting.guid) : null;
        const duration = meeting.durationMinutes ? `${meeting.durationMinutes} min` : "Duration unknown";
        const vimeo = meeting.vimeoUrl ? `<a href="${escapeHtml(meeting.vimeoUrl)}">Vimeo</a>` : "";
        const viewerHref = `viewer.html?guid=${encodeURIComponent(meeting.guid)}${query ? `&q=${encodeURIComponent(query)}` : ""}`;
        const matchLabel = transcriptMatch ? `<span>${transcriptMatch.count} transcript match${transcriptMatch.count === 1 ? "" : "es"}</span>` : "";
        const partLabel = meeting.partLabel ? `<span>${escapeHtml(meeting.partLabel)}</span>` : "";
        return `
          <article class="meeting">
            <h2>${escapeHtml(titleFor(meeting))}</h2>
            <div class="meta">
              <span>${escapeHtml(meeting.date)}</span>
              <span>${escapeHtml(duration)}</span>
              <span class="tag">${escapeHtml(meeting.committee)}</span>
              ${partLabel}
              ${matchLabel}
            </div>
            ${renderDescription(meeting, query)}
            ${renderTranscriptSnippets(transcriptMatch, snippetState, query)}
            <div class="links">
              <a href="${escapeHtml(viewerHref)}">Open transcript</a>
              <button class="open-reader" type="button" data-guid="${escapeHtml(meeting.guid)}">Preview here</button>
              ${vimeo}
              ${meeting.txtUrl ? `<a href="${escapeHtml(meeting.txtUrl)}">TXT</a>` : ""}
              ${meeting.vttUrl ? `<a href="${escapeHtml(meeting.vttUrl)}">VTT</a>` : ""}
            </div>
          </article>
        `;
      }).join("");
    };

    const loadTranscript = async (meeting) => {
      if (state.transcriptCache.has(meeting.guid)) return state.transcriptCache.get(meeting.guid);
      const transcript = await fetchJson(meeting.transcriptDataUrl);
      state.transcriptCache.set(meeting.guid, transcript);
      return transcript;
    };

    const chunkExcerpt = (chunk, query, radius = 170) => {
      const text = collapseWhitespace(chunk.text);
      if (!query) return text.slice(0, 360) + (text.length > 360 ? " ..." : "");
      const lower = normalize(text);
      let index = lower.indexOf(query);
      let matchLength = query.length;
      if (index < 0) {
        for (const term of queryTerms(query)) {
          const termIndex = lower.indexOf(term);
          if (termIndex >= 0 && (index < 0 || termIndex < index)) {
            index = termIndex;
            matchLength = term.length;
          }
        }
      }
      if (index < 0) return text.slice(0, 360) + (text.length > 360 ? " ..." : "");
      const start = Math.max(0, index - radius);
      const end = Math.min(text.length, index + matchLength + radius);
      return `${start > 0 ? "... " : ""}${text.slice(start, end)}${end < text.length ? " ..." : ""}`;
    };

    const buildTranscriptSnippets = (transcript, chunkIndices, query, limit = 3) => {
      const chunksByIndex = new Map((transcript.chunks || []).map((chunk) => [chunk.index, chunk]));
      return chunkIndices
        .map((index) => chunksByIndex.get(index))
        .filter(Boolean)
        .slice(0, limit)
        .map((chunk) => ({
          time: chunk.time || "",
          text: chunkExcerpt(chunk, query)
        }));
    };

    const loadTranscriptSearchSnippets = async (run, query) => {
      if (!state.transcriptMatches || !state.data) return;
      const matchedMeetings = filteredMeetings()
        .filter((meeting) => state.transcriptMatches.has(meeting.guid));
      if (!matchedMeetings.length) return;

      for (const meeting of matchedMeetings) {
        if (!state.searchSnippets.has(meeting.guid)) {
          state.searchSnippets.set(meeting.guid, { loading: true, snippets: [] });
        }
      }
      render();

      await Promise.allSettled(matchedMeetings.map(async (meeting) => {
        const match = state.transcriptMatches.get(meeting.guid);
        if (!match) return;
        try {
          const transcript = await loadTranscript(meeting);
          if (run !== state.searchRun) return;
          state.searchSnippets.set(meeting.guid, {
            loading: false,
            snippets: buildTranscriptSnippets(transcript, match.chunkIndices || [], query)
          });
        } catch (error) {
          if (run !== state.searchRun) return;
          state.searchSnippets.set(meeting.guid, {
            loading: false,
            error: `Could not load transcript preview: ${error.message}`,
            snippets: []
          });
        }
      }));
      if (run === state.searchRun) render();
    };

    const renderReader = () => {
      if (!state.activeMeeting || !state.activeTranscript) return;
      const meeting = state.activeMeeting;
      const chunks = state.activeTranscript.chunks || [];
      const query = normalize(state.readerQuery).trim();
      const matches = query ? chunks.filter((chunk) => normalize(chunk.text).includes(query)) : [];
      const duration = meeting.durationMinutes ? `${meeting.durationMinutes} min` : "Duration unknown";
      const partLabel = meeting.partLabel ? ` · ${meeting.partLabel}` : "";

      els.readerTitle.textContent = titleFor(meeting);
      els.readerMeta.textContent = `${meeting.date} · ${duration} · ${meeting.committee}${partLabel}`;
      els.readerLinks.innerHTML = `
        ${meeting.vimeoUrl ? `<a href="${escapeHtml(meeting.vimeoUrl)}">Vimeo</a>` : ""}
        ${meeting.txtUrl ? `<a href="${escapeHtml(meeting.txtUrl)}">TXT</a>` : ""}
        ${meeting.vttUrl ? `<a href="${escapeHtml(meeting.vttUrl)}">VTT</a>` : ""}
      `;
      els.readerStats.innerHTML = `
        <span class="pill"><strong>${chunks.length}</strong> transcript blocks</span>
        <span class="pill"><strong>${query ? matches.length : "All"}</strong> ${query ? "matching blocks" : "blocks shown"}</span>
      `;
      els.readerMatches.innerHTML = query && matches.length
        ? matches.map((chunk) => `
            <button class="match-button" type="button" data-index="${chunk.index}">
              <span class="match-time">${escapeHtml(chunk.time || "Transcript")}</span>
              <span>${highlightText(chunkExcerpt(chunk, query), query)}</span>
            </button>
          `).join("")
        : "";

      els.readerTranscript.innerHTML = chunks.map((chunk) => `
        <section class="transcript-row" id="transcript-row-${chunk.index}">
          <time class="transcript-time">${escapeHtml(chunk.time || "")}</time>
          <p>${highlightText(chunk.text, query)}</p>
        </section>
      `).join("");
    };

    const focusTranscriptRow = (index) => {
      const row = document.getElementById(`transcript-row-${index}`);
      if (!row) return;
      document.querySelectorAll(".transcript-row.is-focused").forEach((item) => item.classList.remove("is-focused"));
      row.classList.add("is-focused");
      row.scrollIntoView({ block: "center", behavior: "smooth" });
    };

    const openReader = async (guid) => {
      const meeting = state.data.meetings.find((item) => item.guid === guid);
      if (!meeting) return;
      state.activeMeeting = meeting;
      state.activeTranscript = null;
      state.readerQuery = state.query;
      els.readerSearch.value = state.readerQuery;
      els.readerTitle.textContent = titleFor(meeting);
      els.readerMeta.textContent = "Loading transcript...";
      els.readerTranscript.innerHTML = "";
      document.body.classList.add("reader-open");
      els.readerBackdrop.hidden = false;
      try {
        state.activeTranscript = await loadTranscript(meeting);
        renderReader();
      } catch (error) {
        els.readerMeta.textContent = `Could not load transcript: ${error.message}`;
      }
    };

    const closeReader = () => {
      els.readerBackdrop.hidden = true;
      document.body.classList.remove("reader-open");
    };

    els.search.addEventListener("input", (event) => {
      state.query = event.target.value;
      state.transcriptMatches = null;
      state.searchSnippets = new Map();
      scheduleGlobalSearch();
    });

    els.committee.addEventListener("change", (event) => {
      state.committee = event.target.value;
      render();
    });

    els.month.addEventListener("change", (event) => {
      state.month = event.target.value;
      render();
    });

    els.meetings.addEventListener("click", (event) => {
      const toggle = event.target.closest(".desc-toggle");
      if (toggle) {
        const guid = toggle.dataset.guid;
        if (state.expandedDescriptions.has(guid)) {
          state.expandedDescriptions.delete(guid);
        } else {
          state.expandedDescriptions.add(guid);
        }
        render();
        return;
      }

      const button = event.target.closest(".open-reader");
      if (!button) return;
      openReader(button.dataset.guid);
    });

    els.readerSearch.addEventListener("input", (event) => {
      state.readerQuery = event.target.value;
      renderReader();
    });

    els.readerMatches.addEventListener("click", (event) => {
      const button = event.target.closest(".match-button");
      if (!button) return;
      focusTranscriptRow(button.dataset.index);
    });

    els.readerClose.addEventListener("click", closeReader);
    els.readerBackdrop.addEventListener("click", (event) => {
      if (event.target === els.readerBackdrop) closeReader();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.readerBackdrop.hidden) closeReader();
    });

    fetchJson("site-manifest.json", { cache: "no-cache" })
      .then(async (manifest) => {
        state.manifest = manifest;
        state.data = await fetchJson(manifest.siteDataUrl);
        document.title = manifest.siteTitle || document.title;
        populateFilters();
        render();
      })
      .catch((error) => {
        els.summary.textContent = `Could not load site data: ${error.message}`;
      });
  </script>
</body>
</html>
