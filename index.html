<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Committee Transcripts</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5b6573;
      --line: #d7dde6;
      --blue: #1b5f9e;
      --green: #236b4e;
      --amber: #9a5b11;
      --soft-blue: #eaf2fb;
      --soft-green: #e8f4ee;
      --soft-amber: #fff4df;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: grid;
      gap: 14px;
      padding: 24px 0 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .note {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(160px, 260px) minmax(140px, 190px);
      gap: 10px;
      padding: 18px 0 20px;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      font: inherit;
      color: var(--ink);
      background: #fff;
    }

    input:focus, select:focus {
      outline: 3px solid var(--soft-blue);
      border-color: var(--blue);
    }

    main {
      padding: 22px 0 44px;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      padding: 5px 10px;
    }

    .pill strong { color: var(--ink); }

    .meetings {
      display: grid;
      gap: 12px;
    }

    .meeting {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .meeting-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 8px;
    }

    .meeting h2 {
      margin: 0;
      font-size: 1.13rem;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
      white-space: normal;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--soft-green);
      color: var(--green);
      font-size: 0.86rem;
    }

    .desc, .snippet {
      margin: 9px 0 0;
      color: var(--muted);
    }

    .snippets {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .snippet {
      border-left: 3px solid var(--amber);
      background: var(--soft-amber);
      padding: 8px 10px;
      color: #3f3529;
    }

    mark {
      background: #ffdf7e;
      color: #1f1a12;
      padding: 0 2px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 5px 9px;
      color: var(--blue);
      text-decoration: none;
      background: #fff;
      font-size: 0.92rem;
    }

    .links button {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid var(--blue);
      border-radius: 6px;
      padding: 5px 10px;
      color: #fff;
      background: var(--blue);
      font: inherit;
      font-size: 0.92rem;
      cursor: pointer;
    }

    .links a:hover, .links button:hover {
      border-color: var(--blue);
      background: var(--soft-blue);
      color: var(--blue);
    }

    .empty {
      display: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
      color: var(--muted);
    }

    body.reader-open {
      overflow: hidden;
    }

    .reader-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      justify-items: end;
      background: rgba(23, 32, 42, 0.38);
    }

    .reader-backdrop[hidden] {
      display: none;
    }

    .reader {
      width: min(900px, 100%);
      height: 100%;
      overflow: auto;
      background: var(--panel);
      box-shadow: -12px 0 28px rgba(23, 32, 42, 0.22);
    }

    .reader-inner {
      display: grid;
      gap: 14px;
      padding: 20px;
    }

    .reader-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .reader-top h2 {
      margin: 4px 0 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .reader-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .reader-close {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 5px 11px;
      font: inherit;
      cursor: pointer;
    }

    .reader-tools {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .reader-file-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: end;
    }

    .reader-file-links a {
      color: var(--blue);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 9px;
      background: #fff;
    }

    .reader-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
    }

    .reader-matches {
      display: grid;
      gap: 8px;
    }

    .match-button {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 8px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-blue);
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .match-time, .transcript-time {
      color: var(--blue);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .transcript {
      display: grid;
      gap: 2px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .transcript-row {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 10px;
      padding: 8px 6px;
      border-radius: 6px;
    }

    .transcript-row p {
      margin: 0;
    }

    .transcript-row.is-focused {
      background: var(--soft-amber);
      outline: 2px solid #f0bf54;
    }

    @media (max-width: 760px) {
      .wrap { width: min(100% - 22px, 1180px); }
      .controls { grid-template-columns: 1fr; }
      .meeting { padding: 14px; }
      .reader-tools { grid-template-columns: 1fr; }
      .reader-file-links { justify-content: start; }
      .match-button, .transcript-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Select Committee Transcripts</h1>
        <p class="note">These transcripts are automatically generated and may contain errors. Check the source video, TXT, or VTT file before relying on exact wording.</p>
      </div>
      <div class="controls" role="search">
        <input id="search" type="search" autocomplete="off" placeholder="Search title, committee, date, transcript">
        <select id="committee" aria-label="Committee filter">
          <option value="">All committees</option>
        </select>
        <select id="month" aria-label="Month filter">
          <option value="">All months</option>
        </select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="summary" id="summary"></div>
    <section class="meetings" id="meetings" aria-live="polite"></section>
    <div class="empty" id="empty">No meetings match the current filters.</div>
  </main>

  <div class="reader-backdrop" id="readerBackdrop" hidden>
    <section class="reader" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
      <div class="reader-inner">
        <div class="reader-top">
          <div>
            <div class="reader-meta" id="readerMeta"></div>
            <h2 id="readerTitle"></h2>
          </div>
          <button class="reader-close" id="readerClose" type="button">Close</button>
        </div>
        <div class="reader-tools">
          <input id="readerSearch" type="search" autocomplete="off" placeholder="Search this transcript">
          <div class="reader-file-links" id="readerLinks"></div>
        </div>
        <div class="reader-stats" id="readerStats"></div>
        <div class="reader-matches" id="readerMatches"></div>
        <div class="transcript" id="readerTranscript"></div>
      </div>
    </section>
  </div>

  <script>
    const state = {
      data: null,
      query: "",
      committee: "",
      month: "",
      activeMeeting: null,
      readerQuery: ""
    };

    const els = {
      search: document.getElementById("search"),
      committee: document.getElementById("committee"),
      month: document.getElementById("month"),
      summary: document.getElementById("summary"),
      meetings: document.getElementById("meetings"),
      empty: document.getElementById("empty"),
      readerBackdrop: document.getElementById("readerBackdrop"),
      readerTitle: document.getElementById("readerTitle"),
      readerMeta: document.getElementById("readerMeta"),
      readerClose: document.getElementById("readerClose"),
      readerSearch: document.getElementById("readerSearch"),
      readerLinks: document.getElementById("readerLinks"),
      readerStats: document.getElementById("readerStats"),
      readerMatches: document.getElementById("readerMatches"),
      readerTranscript: document.getElementById("readerTranscript")
    };

    const escapeHtml = (value) => String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");

    const normalize = (value) => String(value || "").toLowerCase();

    const collapseWhitespace = (value) => String(value || "").replace(/\s+/g, " ").trim();

    const displayMonth = (month) => {
      if (!month) return "";
      const [year, monthNumber] = month.split("-");
      const date = new Date(Number(year), Number(monthNumber) - 1, 1);
      return date.toLocaleDateString(undefined, { year: "numeric", month: "long" });
    };

    const includesQuery = (meeting, query) => {
      if (!query) return true;
      const haystack = [
        meeting.title,
        meeting.date,
        meeting.committee,
        meeting.transcriptText
      ].map(normalize).join(" ");
      return haystack.includes(query);
    };

    const highlightText = (value, query) => {
      const text = String(value || "");
      if (!query) return escapeHtml(text);
      const regex = new RegExp(`(${escapeRegExp(query)})`, "ig");
      return text.split(regex)
        .map((part) => normalize(part) === normalize(query) ? `<mark>${escapeHtml(part)}</mark>` : escapeHtml(part))
        .join("");
    };

    const countOccurrences = (value, query) => {
      if (!query) return 0;
      let count = 0;
      let index = 0;
      const text = normalize(value);
      while ((index = text.indexOf(query, index)) >= 0) {
        count++;
        index += Math.max(query.length, 1);
        if (count >= 999) return count;
      }
      return count;
    };

    const snippetsFor = (meeting, query, limit = 3, radius = 190) => {
      const text = collapseWhitespace(meeting.transcriptText);
      if (!text) return [];
      if (!query) {
        const excerpt = text.slice(0, 440);
        return [{ text: excerpt + (text.length > excerpt.length ? " ..." : "") }];
      }

      const lower = text.toLowerCase();
      const snippets = [];
      let index = 0;
      while (snippets.length < limit) {
        const matchIndex = lower.indexOf(query, index);
        if (matchIndex < 0) break;
        const start = Math.max(0, matchIndex - radius);
        const end = Math.min(text.length, matchIndex + query.length + radius);
        let snippet = text.slice(start, end);
        if (start > 0) snippet = "... " + snippet;
        if (end < text.length) snippet += " ...";
        snippets.push({ text: snippet });
        index = matchIndex + Math.max(query.length, 1);
      }
      return snippets;
    };

    const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

    const parseTranscript = (meeting) => {
      const text = String(meeting.transcriptText || "").replace(/\r\n/g, "\n");
      return text.split(/\n\s*\n/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block, index) => {
          const match = block.match(/^\[(\d{2}:\d{2}:\d{2})\]\s*([\s\S]*)$/);
          return {
            index,
            time: match ? match[1] : "",
            text: match ? match[2].trim() : block,
            raw: block
          };
        });
    };

    const chunkExcerpt = (chunk, query, radius = 170) => {
      const text = collapseWhitespace(chunk.text);
      if (!query) return text.slice(0, 360) + (text.length > 360 ? " ..." : "");
      const lower = normalize(text);
      const index = lower.indexOf(query);
      if (index < 0) return text.slice(0, 360) + (text.length > 360 ? " ..." : "");
      const start = Math.max(0, index - radius);
      const end = Math.min(text.length, index + query.length + radius);
      return `${start > 0 ? "... " : ""}${text.slice(start, end)}${end < text.length ? " ..." : ""}`;
    };

    const filteredMeetings = () => {
      const query = normalize(state.query).trim();
      return state.data.meetings.filter((meeting) => {
        const committeeMatch = !state.committee || meeting.committee === state.committee;
        const monthMatch = !state.month || meeting.month === state.month;
        return committeeMatch && monthMatch && includesQuery(meeting, query);
      });
    };

    const populateFilters = () => {
      const committees = [...new Set(state.data.meetings.map((item) => item.committee).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b));
      for (const committee of committees) {
        const option = document.createElement("option");
        option.value = committee;
        option.textContent = committee;
        els.committee.appendChild(option);
      }

      const months = [...new Set(state.data.meetings.map((item) => item.month).filter(Boolean))]
        .sort()
        .reverse();
      for (const month of months) {
        const option = document.createElement("option");
        option.value = month;
        option.textContent = displayMonth(month);
        els.month.appendChild(option);
      }
    };

    const render = () => {
      const query = normalize(state.query).trim();
      const meetings = filteredMeetings();
      els.summary.innerHTML = `
        <span class="pill"><strong>${meetings.length}</strong> shown</span>
        <span class="pill"><strong>${state.data.meetingCount}</strong> total</span>
        <span class="pill">Generated ${escapeHtml(new Date(state.data.generatedAt).toLocaleString())}</span>
      `;

      els.empty.style.display = meetings.length ? "none" : "block";
      els.meetings.innerHTML = meetings.map((meeting) => {
        const snippets = snippetsFor(meeting, query);
        const matchCount = countOccurrences(meeting.transcriptText, query);
        const duration = meeting.durationMinutes ? `${meeting.durationMinutes} min` : "Duration unknown";
        const vimeo = meeting.vimeoUrl ? `<a href="${escapeHtml(meeting.vimeoUrl)}">Vimeo</a>` : "";
        const viewerHref = `viewer.html?guid=${encodeURIComponent(meeting.guid)}`;
        const matches = query ? `<span>${matchCount ? `${matchCount} transcript match${matchCount === 1 ? "" : "es"}` : "Metadata match"}</span>` : "";
        return `
          <article class="meeting">
            <div class="meeting-head">
              <div>
                <h2>${escapeHtml(meeting.title)}</h2>
                <div class="meta">
                  <span>${escapeHtml(meeting.date)}</span>
                  <span>${escapeHtml(duration)}</span>
                  <span class="tag">${escapeHtml(meeting.committee)}</span>
                  ${matches}
                </div>
              </div>
            </div>
            <p class="desc">${escapeHtml(meeting.description || "")}</p>
            ${snippets.length ? `<div class="snippets">${snippets.map((snippet) => `<p class="snippet">${highlightText(snippet.text, query)}</p>`).join("")}</div>` : ""}
            <div class="links">
              <a href="${escapeHtml(viewerHref)}">Open transcript</a>
              <button class="open-reader" type="button" data-guid="${escapeHtml(meeting.guid)}">Preview here</button>
              ${vimeo}
              <a href="${escapeHtml(meeting.txtUrl)}">TXT</a>
              <a href="${escapeHtml(meeting.vttUrl)}">VTT</a>
              <a href="${escapeHtml(meeting.folderUrl)}">Folder</a>
            </div>
          </article>
        `;
      }).join("");
    };

    const openReader = (guid) => {
      const meeting = state.data.meetings.find((item) => item.guid === guid);
      if (!meeting) return;
      state.activeMeeting = meeting;
      state.readerQuery = state.query.trim();
      els.readerSearch.value = state.readerQuery;
      els.readerBackdrop.hidden = false;
      document.body.classList.add("reader-open");
      renderReader();
      els.readerSearch.focus();
    };

    const closeReader = () => {
      state.activeMeeting = null;
      els.readerBackdrop.hidden = true;
      document.body.classList.remove("reader-open");
    };

    const renderReader = () => {
      const meeting = state.activeMeeting;
      if (!meeting) return;

      const query = normalize(state.readerQuery).trim();
      const chunks = parseTranscript(meeting);
      const matches = query ? chunks.filter((chunk) => normalize(chunk.raw).includes(query)) : [];
      const duration = meeting.durationMinutes ? `${meeting.durationMinutes} min` : "Duration unknown";

      els.readerTitle.textContent = meeting.title;
      els.readerMeta.textContent = `${meeting.date} · ${duration} · ${meeting.committee}`;
      els.readerLinks.innerHTML = `
        ${meeting.vimeoUrl ? `<a href="${escapeHtml(meeting.vimeoUrl)}">Vimeo</a>` : ""}
        <a href="${escapeHtml(meeting.txtUrl)}">TXT</a>
        <a href="${escapeHtml(meeting.vttUrl)}">VTT</a>
        <a href="${escapeHtml(meeting.folderUrl)}">Folder</a>
      `;
      els.readerStats.innerHTML = `
        <span class="pill"><strong>${chunks.length}</strong> transcript blocks</span>
        <span class="pill"><strong>${query ? matches.length : "All"}</strong> ${query ? "matching blocks" : "blocks shown"}</span>
      `;
      els.readerMatches.innerHTML = query && matches.length
        ? matches.slice(0, 12).map((chunk) => `
            <button class="match-button" type="button" data-index="${chunk.index}">
              <span class="match-time">${escapeHtml(chunk.time || "Transcript")}</span>
              <span>${highlightText(chunkExcerpt(chunk, query), query)}</span>
            </button>
          `).join("")
        : "";

      els.readerTranscript.innerHTML = chunks.map((chunk) => `
        <section class="transcript-row" id="transcript-row-${chunk.index}">
          <time class="transcript-time">${escapeHtml(chunk.time)}</time>
          <p>${highlightText(chunk.text, query)}</p>
        </section>
      `).join("");
    };

    const focusTranscriptRow = (index) => {
      const row = document.getElementById(`transcript-row-${index}`);
      if (!row) return;
      document.querySelectorAll(".transcript-row.is-focused").forEach((item) => item.classList.remove("is-focused"));
      row.classList.add("is-focused");
      row.scrollIntoView({ block: "center", behavior: "smooth" });
    };

    els.search.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    els.committee.addEventListener("change", (event) => {
      state.committee = event.target.value;
      render();
    });

    els.month.addEventListener("change", (event) => {
      state.month = event.target.value;
      render();
    });

    els.meetings.addEventListener("click", (event) => {
      const button = event.target.closest(".open-reader");
      if (!button) return;
      openReader(button.dataset.guid);
    });

    els.readerSearch.addEventListener("input", (event) => {
      state.readerQuery = event.target.value;
      renderReader();
    });

    els.readerMatches.addEventListener("click", (event) => {
      const button = event.target.closest(".match-button");
      if (!button) return;
      focusTranscriptRow(button.dataset.index);
    });

    els.readerClose.addEventListener("click", closeReader);

    els.readerBackdrop.addEventListener("click", (event) => {
      if (event.target === els.readerBackdrop) closeReader();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.readerBackdrop.hidden) closeReader();
    });

    fetch("search-data.json", { cache: "no-cache" })
      .then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      })
      .then((data) => {
        state.data = data;
        document.title = data.siteTitle || document.title;
        populateFilters();
        render();
      })
      .catch((error) => {
        els.summary.textContent = `Could not load search-data.json: ${error.message}`;
      });
  </script>
</body>
</html>
